<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .table-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            width: 800px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #74ebd5;
            color: #fff;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4bb3a7;
            font-weight: bold;
            text-decoration: none;
        }
        .raise-form input {
            width: 60px;
            padding: 5px;
            margin-right: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .raise-form button {
            padding: 6px 10px;
            background: #74ebd5;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .raise-form button:hover {
            background: #4bb3a7;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="table-container">
        <h2>Employee List</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Designation</th>
                    <th>Salary</th>
                    <th>Raise Salary</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.name}"></td>
                    <td th:text="${emp.age}"></td>
                    <td th:text="${emp.designation}"></td>
                    <td th:text="${emp.salary}"></td>
                    <td>
                        <form th:action="@{/raise-salary}" method="post" class="raise-form">
                            <input type="hidden" name="name" th:value="${emp.name}" />
                            <input type="number" name="percent" placeholder="%" required />
                            <button type="submit">Raise</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/add-employee-form}" class="link">Add New Employee</a>
    </div>
</body>
</html>
