spring.application.name=APIGateway-Microservices
server.port=8776

#Product Service
spring.cloud.gateway.server.webmvc.routes[0].id=Product-Service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8889
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/products/**

#Cart Service
spring.cloud.gateway.server.webmvc.routes[1].id=Cart-Service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8888
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/cart/**

#Payment Service
spring.cloud.gateway.server.webmvc.routes[2].id=Payment-Service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8890
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/payment/**

#Eureka Server
spring.cloud.gateway.server.webmvc.routes[3].id=EurekaServer
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8615
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/**