<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>School Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f9f9f9;
        }
        /* Title above header */
        .site-title {
            text-align: center;
            background: #003366;
            color: white;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        header {
            background: #004080;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }
        .header-left a:hover {
            text-decoration: underline;
        }
        .header-right img {
            border-radius: 12px; /* rounded corners */
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 2px solid white;
        }
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            padding: 20px;
        }
        .left, .center, .right {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background: #004080;
            color: white;
            padding: 15px 20px;
        }
        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left img {
            margin-right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%; /* circular images */
            object-fit: cover;
            border: 2px solid white;
        }
        .footer-center {
            text-align: center;
            flex: 1;
        }
        .footer-right {
            text-align: right;
        }
    </style>
</head>
<body>
    <!-- Title above header -->
    <div class="site-title">School Portal</div>

    <!-- Header -->
    <header>
        <!-- Left: Navigation -->
        <div class="header-left">
            <a href="/home">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/student">Student</a>
        </div>

        <!-- Right: Image -->
        <div class="header-right">
            <img src="header-img.png" alt="Header Image">
        </div>
    </header>

    <!-- Three-column layout -->
    <div class="layout">
        <!-- Left segment: dummy links -->
        <div class="left">
            <h4>Quick Links</h4>
            <ul>
                <li><a href="#">Dummy Link 1</a></li>
                <li><a href="#">Dummy Link 2</a></li>
                <li><a href="#">Dummy Link 3</a></li>
            </ul>
        </div>

        <!-- Center segment: dynamic content -->
        <div class="center">
            <h3 th:text="${title}"></h3>
            <p th:text="${message}"></p>
            <p th:text="${name}"></p>
            <p th:text="${course}"></p>
            <p th:text="${semester}"></p>
            <p th:text="${college}"></p>
        </div>

        <!-- Right segment: image -->
        <div class="right">
            <img src="images/car_vert.jpg" alt="Side Image" style="width:100%; border-radius:12px; border:2px solid #ccc;">
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <!-- Left: Images -->
            <div class="footer-left">
                <img src="img1.png" alt="Logo1">
                <img src="img2.png" alt="Logo2">
                <img src="img3.png" alt="Logo3">
            </div>

            <!-- Center: Copyright -->
            <div class="footer-center">
                <p>&copy; 2026 School Portal. All rights reserved.</p>
            </div>

            <!-- Right: Address -->
            <div class="footer-right">
                <p>123 School Street,<br> Jalandhar, Punjab, India</p>
            </div>
        </div>
    </footer>
</body>
</html>
